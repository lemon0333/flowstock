apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: flowstock
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/lemon0333/flowstock-ai:latest
          ports:
            - containerPort: 8000
          env:
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: CLAUDE_API_KEY
            - name: LOG_LEVEL
              value: "INFO"
            - name: MYSQL_HOST
              value: "mysql.flowstock.svc.cluster.local"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_USER
              value: "flowstock"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_DATABASE
              value: "flowstock_ai"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: flowstock
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
