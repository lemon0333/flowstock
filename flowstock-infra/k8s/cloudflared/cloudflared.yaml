apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: flowstock
data:
  config.yml: |
    tunnel: flowstock-tunnel
    credentials-file: /etc/cloudflared/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      - hostname: api.flowstock.info
        service: http://flowstock-backend.flowstock.svc.cluster.local:80
      - service: http_status:404
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-credentials
  namespace: flowstock
type: Opaque
stringData:
  credentials.json: |
    {
      "AccountTag": "${CLOUDFLARE_ACCOUNT_TAG}",
      "TunnelSecret": "${CLOUDFLARE_TUNNEL_SECRET}",
      "TunnelID": "${CLOUDFLARE_TUNNEL_ID}"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: flowstock
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yml
            - run
            - flowstock-tunnel
          ports:
            - containerPort: 2000
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yml
              subPath: config.yml
              readOnly: true
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: credentials
          secret:
            secretName: cloudflared-credentials
