apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowstock-backend
  namespace: flowstock
  labels:
    app: flowstock-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowstock-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # 무중단 배포
  template:
    metadata:
      labels:
        app: flowstock-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: flowstock-backend
          image: ghcr.io/lemon0333/flowstock-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_HOST
              value: "postgresql.flowstock.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "flowstock"
            - name: DB_USERNAME
              value: "flowstock"
            - name: REDIS_HOST
              value: "redis.flowstock.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            # Secrets
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: JWT_SECRET
            - name: KIS_APP_KEY
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: KIS_APP_KEY
            - name: KIS_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: KIS_APP_SECRET
            - name: DART_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: DART_API_KEY
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: CLAUDE_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: flowstock-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AI_SERVICE_URL
              value: "http://ai-service.flowstock.svc.cluster.local:8000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: flowstock-backend
  namespace: flowstock
spec:
  selector:
    app: flowstock-backend
  ports:
    - port: 80
      targetPort: 8080
---
# HPA — CPU 70% 넘으면 자동 스케일 (32GB라 최대 3개)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flowstock-backend-hpa
  namespace: flowstock
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flowstock-backend
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
