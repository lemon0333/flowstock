# 실제 값은 base64로 인코딩해서 넣기
# echo -n "your-value" | base64
# 또는 kubectl create secret generic 명령어로 생성 권장
#
# kubectl create secret generic flowstock-secrets \
#   --from-literal=KIS_APP_KEY=xxx \
#   --from-literal=KIS_APP_SECRET=xxx \
#   --from-literal=DART_API_KEY=xxx \
#   --from-literal=CLAUDE_API_KEY=xxx \
#   --from-literal=JWT_SECRET=xxx \
#   --from-literal=DB_PASSWORD=xxx \
#   --from-literal=REDIS_PASSWORD=xxx \
#   --from-literal=AWS_ACCESS_KEY_ID=xxx \
#   --from-literal=AWS_SECRET_ACCESS_KEY=xxx \
#   -n flowstock

apiVersion: v1
kind: Secret
metadata:
  name: flowstock-secrets
  namespace: flowstock
type: Opaque
data:
  KIS_APP_KEY: ""         # base64 인코딩 값
  KIS_APP_SECRET: ""
  DART_API_KEY: ""
  CLAUDE_API_KEY: ""
  JWT_SECRET: ""
  DB_PASSWORD: ""
  REDIS_PASSWORD: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
