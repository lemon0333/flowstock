name: "Task"
description: "개발 작업을 등록할 때 사용합니다"
labels: ["task"]
body:
  - type: dropdown
    id: service
    attributes:
      label: "서비스"
      options:
        - Frontend (React)
        - Backend (Kotlin/Spring)
        - AI Service (Python/FastAPI)
        - Infrastructure (k8s/Terraform)
        - 전체
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "작업 내용"
      description: "무엇을 해야 하나요?"
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: "체크리스트"
      description: "세부 작업 항목"
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 테스트 작성
