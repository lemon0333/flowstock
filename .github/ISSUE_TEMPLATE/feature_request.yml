name: "Feature Request"
description: "새로운 기능을 제안할 때 사용합니다"
labels: ["enhancement"]
body:
  - type: dropdown
    id: service
    attributes:
      label: "서비스"
      description: "어떤 서비스에 관련된 기능인가요?"
      options:
        - Frontend (React)
        - Backend (Kotlin/Spring)
        - AI Service (Python/FastAPI)
        - Infrastructure (k8s/Terraform)
        - 전체
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "기능 설명"
      description: "어떤 기능을 원하시나요?"
      placeholder: "구현하고 싶은 기능을 상세히 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "배경/동기"
      description: "왜 이 기능이 필요한가요?"
      placeholder: "이 기능이 해결하는 문제나 가져다줄 가치를 설명해주세요"

  - type: textarea
    id: alternatives
    attributes:
      label: "대안"
      description: "고려한 다른 방법이 있나요?"
