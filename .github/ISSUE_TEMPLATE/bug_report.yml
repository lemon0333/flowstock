name: "Bug Report"
description: "버그를 발견했을 때 사용합니다"
labels: ["bug"]
body:
  - type: dropdown
    id: service
    attributes:
      label: "서비스"
      description: "어떤 서비스에서 발생했나요?"
      options:
        - Frontend (React)
        - Backend (Kotlin/Spring)
        - AI Service (Python/FastAPI)
        - Infrastructure (k8s/Terraform)
        - 기타
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "버그 설명"
      description: "무엇이 잘못되었는지 설명해주세요"
      placeholder: "어떤 동작을 기대했고, 실제로는 어떻게 동작했나요?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "재현 방법"
      description: "버그를 재현하는 단계"
      placeholder: |
        1. '...' 페이지로 이동
        2. '...' 클릭
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "에러 로그"
      description: "관련 에러 로그가 있다면 붙여넣기"
      render: shell

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      options:
        - "P0: 서비스 장애"
        - "P1: 핵심 기능 불가"
        - "P2: 기능 제한"
        - "P3: 사소한 문제"
    validations:
      required: true
