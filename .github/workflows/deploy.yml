name: Deploy FlowStock

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/lemon0333/flowstock-backend
  AI_IMAGE: ghcr.io/lemon0333/flowstock-ai

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('flowstock-backend/**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build with Gradle
        working-directory: flowstock-backend
        run: chmod +x gradlew && ./gradlew :app:bootJar --no-daemon

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: flowstock-backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  build-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: flowstock-ai
          push: true
          tags: |
            ${{ env.AI_IMAGE }}:latest
            ${{ env.AI_IMAGE }}:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flowstock-front/package-lock.json

      - name: Install dependencies
        working-directory: flowstock-front
        run: npm ci

      - name: Build
        working-directory: flowstock-front
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Sync to S3
        working-directory: flowstock-front
        run: aws s3 sync dist/ s3://flowstock-frontend --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: [build-backend, build-ai]
    steps:
      - name: Deploy to k3s via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MINI_PC_HOST }}
          username: ubuntu
          key: ${{ secrets.MINI_PC_SSH_KEY }}
          script: |
            # Pull latest images
            sudo crictl pull ${{ env.BACKEND_IMAGE }}:latest
            sudo crictl pull ${{ env.AI_IMAGE }}:latest

            # Rolling update backend
            kubectl set image deployment/flowstock-backend \
              flowstock-backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
              -n flowstock

            # Rolling update AI service
            kubectl set image deployment/ai-service \
              ai-service=${{ env.AI_IMAGE }}:${{ github.sha }} \
              -n flowstock

            # Wait for rollout
            kubectl rollout status deployment/flowstock-backend -n flowstock --timeout=120s
            kubectl rollout status deployment/ai-service -n flowstock --timeout=120s
