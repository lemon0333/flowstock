name: Deploy FlowStock

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/lemon0333/flowstock-backend
  AI_IMAGE: ghcr.io/lemon0333/flowstock-ai

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('flowstock-backend/**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build with Gradle
        working-directory: flowstock-backend
        run: chmod +x gradlew && ./gradlew :app:bootJar --no-daemon

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: flowstock-backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  build-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: flowstock-ai
          push: true
          tags: |
            ${{ env.AI_IMAGE }}:latest
            ${{ env.AI_IMAGE }}:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flowstock-front/package-lock.json

      - name: Install dependencies
        working-directory: flowstock-front
        run: npm ci

      - name: Build
        working-directory: flowstock-front
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create flowstock-front \
            --production-branch=main || echo "(project already exists, continuing)"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy flowstock-front/dist \
            --project-name=flowstock-front \
            --branch=main

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: [build-backend, build-ai]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tailscale connect
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      - name: Add mini PC to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.MINI_PC_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to k3s via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MINI_PC_HOST }}
          username: lemon
          key: ${{ secrets.MINI_PC_SSH_KEY }}
          script: |
            set -e
            export KUBECONFIG=$HOME/.kube/config
            cd /opt/flowstock
            git pull origin main

            cd flowstock-infra

            # 1) namespace + secrets
            k3s kubectl apply -f k8s/namespace/namespaces.yaml
            bash scripts/generate-secrets.sh

            # 2) DBs (idempotent)
            k3s kubectl apply -f k8s/postgresql/postgresql.yaml
            k3s kubectl apply -f k8s/mysql/mysql.yaml
            k3s kubectl apply -f k8s/redis/redis.yaml

            # 3) Cloudflared (envsubst with .env)
            set -a; source .env; set +a
            envsubst < k8s/cloudflared/cloudflared.yaml | k3s kubectl apply -f -

            # 4) AI + Backend
            k3s kubectl apply -f k8s/ai-service/deployment.yaml
            k3s kubectl apply -f k8s/backend/deployment.yaml

            # 4) Rolling update with this commit's SHA tag
            k3s kubectl set image deployment/flowstock-backend \
              flowstock-backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
              -n flowstock
            k3s kubectl set image deployment/ai-service \
              ai-service=${{ env.AI_IMAGE }}:${{ github.sha }} \
              -n flowstock

            # 5) Wait for rollout
            k3s kubectl rollout status deployment/flowstock-backend -n flowstock --timeout=300s
            k3s kubectl rollout status deployment/ai-service -n flowstock --timeout=300s

            # 6) Status
            k3s kubectl get pods -n flowstock
