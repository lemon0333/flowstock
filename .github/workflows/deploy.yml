name: Deploy FlowStock

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/lemon0333/flowstock-backend
  AI_IMAGE: ghcr.io/lemon0333/flowstock-ai

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('flowstock-backend/**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Test (JUnit5)
        working-directory: flowstock-backend
        run: chmod +x gradlew && ./gradlew :app:test --no-daemon

      - name: Build with Gradle
        working-directory: flowstock-backend
        run: ./gradlew :app:bootJar --no-daemon

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: flowstock-backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  build-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: flowstock-ai
          push: true
          tags: |
            ${{ env.AI_IMAGE }}:latest
            ${{ env.AI_IMAGE }}:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flowstock-front/package-lock.json

      - name: Install dependencies
        working-directory: flowstock-front
        run: npm ci

      - name: Build
        working-directory: flowstock-front
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          VITE_NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          VITE_NAVER_CALLBACK_URL: https://flowstock.info/login
          VITE_API_URL: https://api.flowstock.info/api
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create flowstock-front \
            --production-branch=main || echo "(project already exists, continuing)"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy flowstock-front/dist \
            --project-name=flowstock-front \
            --branch=main

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: [build-backend, build-ai]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tailscale connect
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      - name: Tailscale diagnostics
        run: |
          echo "=== tailscale status ==="
          tailscale status || echo "(tailscale status failed)"
          echo
          echo "=== reaching mini PC (TCP 22) ==="
          timeout 10 bash -c "</dev/tcp/${{ secrets.MINI_PC_HOST }}/22" \
            && echo "[OK] TCP 22 reachable" \
            || echo "[FAIL] cannot reach mini PC on port 22"
          echo
          echo "=== ping mini PC ==="
          ping -c 3 -W 2 ${{ secrets.MINI_PC_HOST }} || echo "(ping failed — could be ICMP blocked, not necessarily fatal)"

      - name: Add mini PC to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.MINI_PC_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to k3s via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MINI_PC_HOST }}
          username: lemon
          key: ${{ secrets.MINI_PC_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export KUBECONFIG=$HOME/.kube/config
            cd /opt/flowstock
            git fetch origin main
            git reset --hard origin/main

            cd flowstock-infra

            # 1) namespace + secrets
            k3s kubectl apply -f k8s/namespace/namespaces.yaml
            bash scripts/generate-secrets.sh

            # 2) DBs (idempotent)
            k3s kubectl apply -f k8s/postgresql/postgresql.yaml
            k3s kubectl apply -f k8s/mysql/mysql.yaml
            k3s kubectl apply -f k8s/redis/redis.yaml

            # 3) Cloudflared (envsubst with .env) — ingress rule 변경 즉시 반영 위해 rollout restart
            set -a; source .env; set +a
            CLOUDFLARED_BEFORE=$(k3s kubectl get configmap cloudflared-config -n flowstock -o jsonpath='{.data.config\.yml}' 2>/dev/null | sha256sum | cut -d' ' -f1)
            envsubst < k8s/cloudflared/cloudflared.yaml | k3s kubectl apply -f -
            CLOUDFLARED_AFTER=$(k3s kubectl get configmap cloudflared-config -n flowstock -o jsonpath='{.data.config\.yml}' 2>/dev/null | sha256sum | cut -d' ' -f1)
            if [ "$CLOUDFLARED_BEFORE" != "$CLOUDFLARED_AFTER" ]; then
              echo "Cloudflared config changed — rollout restart"
              k3s kubectl rollout restart deployment/cloudflared -n flowstock
            fi

            # 4) Observability — Prometheus / Grafana / kube-state-metrics / node-exporter / Jaeger
            k3s kubectl apply -f k8s/monitoring/kube-state-metrics.yaml || true
            k3s kubectl apply -f k8s/monitoring/node-exporter.yaml || true
            k3s kubectl apply -f k8s/monitoring/prometheus.yaml || true
            k3s kubectl apply -f k8s/monitoring/grafana.yaml || true
            k3s kubectl apply -f k8s/jaeger/jaeger.yaml || true

            # 5) AI + Backend
            k3s kubectl apply -f k8s/ai-service/deployment.yaml
            k3s kubectl apply -f k8s/backend/deployment.yaml

            # 4) Rolling update with this commit's SHA tag
            k3s kubectl set image deployment/flowstock-backend \
              flowstock-backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
              -n flowstock
            k3s kubectl set image deployment/ai-service \
              ai-service=${{ env.AI_IMAGE }}:${{ github.sha }} \
              -n flowstock

            # 5) Wait for rollout (Spring 부팅 ~90s + rolling update 여유까지 10분 잡음)
            k3s kubectl rollout status deployment/flowstock-backend -n flowstock --timeout=600s
            k3s kubectl rollout status deployment/ai-service -n flowstock --timeout=600s

            # 6) Status
            k3s kubectl get pods -n flowstock
